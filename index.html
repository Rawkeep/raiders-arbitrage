<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#06060c" />
    <meta name="description" content="FlipFlow Pro — Multi-Plattform Arbitrage Engine für Kleinanzeigen, eBay, Vinted & mehr" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FlipFlow Pro" />
    <meta property="og:description" content="Multi-Plattform Arbitrage Engine — Finde, kaufe & verkaufe mit KI-Scoring über Kleinanzeigen, eBay, Vinted & mehr." />
    <meta property="og:image" content="/og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FlipFlow Pro" />
    <meta name="twitter:description" content="Multi-Plattform Arbitrage Engine — Finde, kaufe & verkaufe mit KI-Scoring." />
    <meta name="twitter:image" content="/og-image.svg" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <title>FlipFlow Pro</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; }
      body {
        background: #06060c;
        color: #e2e8f0;
        font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      /* Prevent FOUC */
      #root:empty::after {
        content: '';
        display: block;
        width: 40px;
        height: 40px;
        margin: 40vh auto;
        border: 3px solid #ffffff12;
        border-top-color: #3B82F6;
        border-radius: 50%;
        animation: loader-spin 0.8s linear infinite;
      }
      @keyframes loader-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
