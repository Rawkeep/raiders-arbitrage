<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      background: #06060c;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid #ffffff08;
    }
    .logo {
      width: 28px; height: 28px; border-radius: 6px;
      background: linear-gradient(135deg, #F97316, #EC4899);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .title { font-weight: 700; font-size: 14px; }
    .subtitle { font-size: 10px; color: #475569; }
    .content { padding: 14px 16px; }
    .status {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 8px;
      background: #12121e; border: 1px solid #ffffff08;
      margin-bottom: 12px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.green { background: #10B981; box-shadow: 0 0 6px #10B98166; }
    .dot.red { background: #EF4444; }
    .dot.yellow { background: #F59E0B; }
    .count { color: #94a3b8; font-size: 12px; }
    .btn {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; margin-bottom: 6px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn.primary { background: linear-gradient(135deg, #3B82F6, #6366F1); color: #fff; }
    .btn.green { background: #10B981; color: #fff; }
    .btn.ghost { background: transparent; border: 1px solid #ffffff15; color: #94a3b8; }
    .results { margin-top: 12px; max-height: 240px; overflow-y: auto; }
    .item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; border-radius: 6px;
      background: #0a0a15; border: 1px solid #ffffff06;
      margin-bottom: 4px;
    }
    .item-title { font-size: 11px; color: #e2e8f0; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-price { color: #10B981; font-weight: 700; font-size: 12px; }
    .setting { padding: 10px 0; border-top: 1px solid #ffffff06; }
    .setting label { color: #64748b; font-size: 11px; display: block; margin-bottom: 4px; }
    .setting input {
      width: 100%; background: #0a0a15; border: 1px solid #ffffff12;
      border-radius: 6px; padding: 8px 10px; color: #e2e8f0;
      font-size: 12px; outline: none;
    }
    .msg { text-align: center; padding: 16px; color: #475569; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡</div>
    <div>
      <div class="title">FlipFlow Pro</div>
      <div class="subtitle">Listing Capture</div>
    </div>
  </div>

  <div class="content">
    <div class="status" id="status">
      <div class="dot yellow" id="statusDot"></div>
      <span id="statusText">Erkenne Seite...</span>
    </div>

    <button class="btn primary" id="extractBtn">Listings auf dieser Seite erfassen</button>
    <button class="btn green" id="sendBtn" style="display:none">An FlipFlow senden</button>

    <div class="results" id="results"></div>

    <div class="setting">
      <label>FlipFlow Server URL</label>
      <input id="serverUrl" value="http://localhost:3001" placeholder="http://localhost:3001" />
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
